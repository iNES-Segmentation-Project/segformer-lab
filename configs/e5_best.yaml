# configs/e5_best.yaml
#
# E5 — Paper-like Experiment (최종 성능 확인)
# ─────────────────────────────────────────────
# E0~E4 internal 실험에서 선정된 best 구조에 적용하는 설정.
# 구조 비교 실험이 아니라 "최대 성능 추출" 실험이다.
#
# 사용 전 교체 필요 항목:
#   model_type   ← E0~E4 결과 기준 best 구조로 변경
#   loss_type    ← E0~E4 결과 기준 best loss로 변경
#   exp_name     ← model_type / loss_type 반영해서 변경
#   pretrained_path ← 실제 MiT-B0 가중치 파일 경로로 변경
#
# internal yaml(E0~E4)과 달라지는 핵심 설정:
#   augmentation_type : basic → paperlike
#   pretrained        : false → true
#   scheduler_type    : poly  → warmup_poly
#   epochs            : 40    → 100
#   input_size        : [360, 480] → [512, 512]

exp_name: e5_best_internal  # ← best 구조 확정 후 교체

# ── Model ─────────────────────────────────────────────────────────────────────
model_type:  mlp        # ← E0~E4 best 구조로 교체 (mlp | fpn)
num_classes: 11
embed_dim:   256
dropout:     0.1
pretrained:  true
pretrained_path: weights/mit_b0_backbone.pth  # ← 실제 경로로 교체

# ── Loss ──────────────────────────────────────────────────────────────────────
loss_type: ce           # ← E0~E4 best loss로 교체 (ce | focal | ce_dice | ce_boundary)

# ── Data ──────────────────────────────────────────────────────────────────────
input_size:        [512, 512]   # internal(360×480) 대비 확대
augmentation_type: paperlike    # internal=basic → E5 전용
num_workers:       4

train_img_dir: datasets/CamVid/train
train_lbl_dir: datasets/CamVid/train_labels
val_img_dir:   datasets/CamVid/val
val_lbl_dir:   datasets/CamVid/val_labels

# ── Training ──────────────────────────────────────────────────────────────────
batch_size:   4
epochs:       100               # internal(40) 대비 확대
lr:           6.0e-5
weight_decay: 0.01

# ── Scheduler ─────────────────────────────────────────────────────────────────
scheduler_type: warmup_poly     # internal=poly → E5 전용
warmup_ratio:   0.1             # 전체 iter의 10% warmup

# ── Output ────────────────────────────────────────────────────────────────────
save_dir: weights
